# ==========================================
# ESTRUCTURA DEL PROMPT (Izquierda y Derecha)
# ==========================================
format = """\
$directory\
$os\
$git_branch\
$git_status\
$fill\
$nodejs\
$rust\
$dotnet\
$python\
$golang\
$php\
$bun\
$java\
$lua\
$c\
$zig\
$cmd_duration\
$time\
\n$character \
"""

add_newline = true
command_timeout = 3600000

# ==========================================
# PALETA DE COLORES ONEDARKPRO
# ==========================================
palette = "onedarkpro"

[palettes.onedarkpro]
blue = "#61afef"
cyan = "#56b6c2"
green = "#98c379"
magenta = "#c678dd"
red = "#e06c75"
yellow = "#e5c07b"
orange = "#d19a66"
fg = "#abb2bf"
bg = "#282c34"
gray = "#5c6370"

# ==========================================
# MÓDULOS BASE
# ==========================================
[fill]
symbol = ' '

[character]
success_symbol = "[󱇪](bold fg:cyan)" 
error_symbol = "[󱇪](bold fg:red)"

[directory]
style = "bold fg:blue"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 2
truncate_to_repo = true
truncation_symbol = "…/"
read_only = "  "
read_only_style = "fg:blue"
before_repo_root_style = "fg:blue"

# ==========================================
# GIT
# ==========================================
[git_branch]
format = "-> [$symbol$branch]($style) "
style = "bold fg:magenta"
symbol = " "

[git_status]
format = '[$all_status$ahead_behind]($style) '
style = "bold fg:red"

# ==========================================
# LENGUAJES DE PROGRAMACIÓN (TU STACK)
# ==========================================
[rust]
format = '[[ $symbol($version) ](fg:orange)]($style)'
symbol = " "

[dotnet]
format = '[[ $symbol($version) ](fg:blue)]($style)'
symbol = "󰪮 "

[python]
format = '[[ ${symbol}${pyenv_prefix}(${version})( \\($virtualenv\\)) ](fg:yellow)]($style)'
symbol = " "

[nodejs]
format = '[[ $symbol($version) ](fg:green)]($style)'
symbol = " "

[golang]
format = '[[ $symbol($version) ](fg:cyan)]($style)'
symbol = " "

[java]
format = '[[ $symbol($version) ](fg:red)]($style)'
symbol = " "

[c]
format = '[[ $symbol($version) ](fg:blue)]($style)'
symbol = " "

[lua]
format = '[[ $symbol($version) ](fg:blue)]($style)'
symbol = " "

[zig]
format = '[[ $symbol($version) ](fg:orange)]($style)'
symbol = " "

[bun]
format = '[[ $symbol($version) ](fg:fg)]($style)'
symbol = " "

[php]
format = '[[ $symbol($version) ](fg:magenta)]($style)'
symbol = " "

[cmd_duration]
format = "[ 󰔛 $duration](bold fg:gray)"
min_time = 500

[time]
disabled = false
time_format = "%R"                            # Hour:Minute Format
format = '[[   $time ](fg:fg)]($style)'
